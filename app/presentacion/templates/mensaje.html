<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$titulo — Sistema de Reservas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2.5rem 2rem; width: 100%; max-width: 420px; text-align: center; }
    h1 { font-size: 1.3rem; color: #2b6cb0; margin-bottom: 1rem; }
    p { color: #4a5568; font-size: .95rem; margin-bottom: 1.5rem; line-height: 1.6; }
    a.btn { display: inline-block; padding: .55rem 1.4rem; background: #2b6cb0; color: #fff; border-radius: 4px; text-decoration: none; font-size: .9rem; }
    a.btn:hover { background: #2c5282; }
  </style>
</head>
<body>
  <div class="card">
    <h1>$titulo</h1>
    <p>$mensaje</p>
    <a href="$enlace" class="btn">$texto_enlace</a>
  </div>
</body>
</html>
