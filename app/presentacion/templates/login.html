<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Sistema de Reservas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    h1 { font-size: 1.3rem; color: #2b6cb0; margin-bottom: 1.5rem; text-align: center; }
    label { display: block; font-size: .85rem; color: #4a5568; margin-bottom: .25rem; margin-top: 1rem; }
    input { width: 100%; padding: .5rem .75rem; border: 1px solid #cbd5e0; border-radius: 4px; font-size: .9rem; }
    input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 2px #bee3f8; }
    .btn { display: block; width: 100%; margin-top: 1.5rem; padding: .65rem; background: #2b6cb0; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #2c5282; }
    .error { background: #fff5f5; color: #c53030; border-left: 3px solid #fc8181; padding: .65rem .9rem; border-radius: 4px; margin-bottom: .5rem; font-size: .875rem; }
    .footer { text-align: center; margin-top: 1rem; font-size: .85rem; color: #718096; }
    .footer a { color: #2b6cb0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📅 Iniciar sesión</h1>
    ${error_block}
    <form method="post" action="/login">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" value="$email" required autofocus>
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" class="btn">Entrar</button>
    </form>
    <p class="footer">¿Sin cuenta? <a href="/registro">Registrarse</a></p>
  </div>
</body>
</html>
