<div class="card">
  <h2>Agregar nuevo espacio</h2>
  <form method="post" action="/espacios">
    <label for="nombre_espacio">Nombre</label>
    <input type="text" id="nombre_espacio" name="nombre" required>
    <label for="descripcion">Descripción</label>
    <textarea id="descripcion" name="descripcion" rows="2"></textarea>
    <label for="capacidad">Capacidad (personas)</label>
    <input type="number" id="capacidad" name="capacidad" min="1" value="1" required>
    <button type="submit" class="btn">Crear espacio</button>
  </form>
</div>
