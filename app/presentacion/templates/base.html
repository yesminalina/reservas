<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$titulo — Sistema de Reservas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }
    header {
      background: #2b6cb0;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.25rem; letter-spacing: .5px; }
    nav a, nav button.btn-nav {
      color: #bee3f8;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
      padding: 0;
    }
    nav a:hover, nav button.btn-nav:hover { color: #fff; text-decoration: underline; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
    }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: #2d3748; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: .5rem .75rem; background: #ebf8ff; color: #2b6cb0; border-bottom: 2px solid #bee3f8; }
    td { padding: .5rem .75rem; border-bottom: 1px solid #e2e8f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }
    .badge-activa   { background: #c6f6d5; color: #276749; border-radius: 4px; padding: 2px 8px; font-size: .8rem; }
    .badge-cancelada{ background: #fed7d7; color: #9b2c2c; border-radius: 4px; padding: 2px 8px; font-size: .8rem; }
    form label { display: block; font-size: .875rem; color: #4a5568; margin-bottom: .25rem; margin-top: .75rem; }
    form input, form textarea, form select {
      width: 100%; padding: .5rem .75rem; border: 1px solid #cbd5e0;
      border-radius: 4px; font-size: .9rem; font-family: inherit;
    }
    form input:focus, form textarea:focus, form select:focus {
      outline: none; border-color: #4299e1; box-shadow: 0 0 0 2px #bee3f8;
    }
    .btn {
      display: inline-block; margin-top: 1rem; padding: .55rem 1.25rem;
      background: #2b6cb0; color: #fff; border: none; border-radius: 4px;
      font-size: .9rem; cursor: pointer; font-family: inherit;
    }
    .btn:hover { background: #2c5282; }
    .btn-cancelar {
      padding: .3rem .7rem; background: #e53e3e; color: #fff;
      border: none; border-radius: 4px; font-size: .8rem; cursor: pointer;
    }
    .btn-cancelar:hover { background: #c53030; }
    .error { background: #fff5f5; color: #c53030; border-left: 3px solid #fc8181; padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
    .success { background: #f0fff4; color: #276749; border-left: 3px solid #68d391; padding: .75rem 1rem; border-radius: 4px; }
    a.link { color: #2b6cb0; }
  </style>
</head>
<body>
  <header>
    <h1>📅 Sistema de Reservas</h1>
    $nav
  </header>
  <main>
    $contenido
  </main>
</body>
</html>
